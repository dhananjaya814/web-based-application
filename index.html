<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Student Dashboard</h1>
    </header>

    <div class="container">
        
        <nav class="sidebar">
            <ul>
                <li>🏠 Home</li>
                <li>📚 Courses</li>
                <li>📝 Assignments</li>
                <li>👤 Profile</li>
            </ul>
        </nav>

        <main class="content">
            <div class="card">
                <h2>Welcome</h2>
                <p>This is your dashboard.</p>
            </div>

            <div class="card">
                <h2>Courses</h2>
                <p>You are enrolled in 3 courses.</p>
            </div>

            <div class="card">
                <h2>Assignments</h2>
                <p>You have 2 pending assignments.</p>
            </div>
        </main>

    </div>

</body>
</html>
